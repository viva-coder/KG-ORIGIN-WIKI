<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGIN — Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root {
  --bg:       #0d0c0a;
  --surface:  #141210;
  --surface2: #1a1814;
  --border:   rgba(180,155,100,0.15);
  --border2:  rgba(180,155,100,0.28);
  --gold:     #B8934A;
  --gold2:    #D4AA6A;
  --gold-dim: rgba(184,147,74,0.18);
  --text:     #E8DFC8;
  --text2:    #9A8E78;
  --text3:    #6A5E4A;
  --accent:   #7A9E8A;   /* sage green */
  --accent2:  #5A7E6A;
  --earth:    #8A6E4A;
  --font-ser: 'Cormorant Garamond', Georgia, serif;
  --font-mon: 'DM Mono', 'Courier New', monospace;
  --panel-w:  340px;
  --sidebar-w:220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font-ser); }

/* ── Layout ── */
#app { display:flex; width:100%; height:100%; }

/* ── Sidebar ── */
#sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w); height:100%;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:10; overflow:hidden;
}
.sb-logo {
  padding:20px 16px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:11px;
}
.sb-logo img { width:34px; height:34px; object-fit:contain; opacity:.9; }
.sb-logo-text { line-height:1.2; }
.sb-logo-name { font-size:18px; font-weight:400; letter-spacing:.04em; color:var(--gold2); }
.sb-logo-sub  { font-size:10px; font-family:var(--font-mon); color:var(--text3); letter-spacing:.1em; text-transform:uppercase; }

.sb-section { padding:16px 12px 6px; font-size:9px; font-family:var(--font-mon); color:var(--text3); letter-spacing:.12em; text-transform:uppercase; }

.sb-btn {
  display:flex; align-items:center; gap:9px; width:100%;
  padding:9px 14px; border:none; background:none; cursor:pointer;
  color:var(--text2); font-family:var(--font-ser); font-size:13.5px;
  text-align:left; transition:all .15s; border-left:2px solid transparent;
}
.sb-btn:hover { color:var(--text); background:var(--gold-dim); }
.sb-btn.active { color:var(--gold2); border-left-color:var(--gold); background:rgba(184,147,74,0.08); }
.sb-btn .icon { font-size:11px; opacity:.6; min-width:14px; }

.sb-cats { flex:1; overflow-y:auto; padding:4px 0; }
.sb-cats::-webkit-scrollbar { width:3px; }
.sb-cats::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.cat-chip {
  display:flex; align-items:center; gap:7px; padding:6px 14px;
  font-size:12px; color:var(--text2); cursor:pointer;
  transition:color .15s; border-left:2px solid transparent;
}
.cat-chip:hover { color:var(--text); }
.cat-chip.active { color:var(--text); border-left-color:var(--gold); }
.cat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

.sb-footer {
  padding:14px 12px; border-top:1px solid var(--border);
  font-size:10px; font-family:var(--font-mon); color:var(--text3);
  line-height:1.8;
}
.sb-date { color:var(--gold); font-size:10px; }

/* ── Main area ── */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── Toolbar ── */
#toolbar {
  height:52px; min-height:52px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; padding:0 16px;
  background:var(--surface);
}
.tb-title { font-size:20px; font-weight:300; letter-spacing:.04em; color:var(--gold2); margin-right:auto; }
#search-box {
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:6px; padding:6px 12px; color:var(--text);
  font-family:var(--font-mon); font-size:12px; width:190px; outline:none;
  transition:border-color .2s;
}
#search-box::placeholder { color:var(--text3); }
#search-box:focus { border-color:var(--gold); }
.tb-btn {
  background:none; border:1px solid var(--border2); border-radius:6px;
  padding:6px 13px; color:var(--text2); font-family:var(--font-mon); font-size:11px;
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.tb-btn:hover { border-color:var(--gold); color:var(--gold2); }
.tb-btn.primary { background:var(--gold-dim); border-color:var(--gold); color:var(--gold2); }
.tb-btn.primary:hover { background:rgba(184,147,74,0.28); }

/* ── Graph container ── */
#graph-wrap { flex:1; position:relative; overflow:hidden; }
#graph-svg { width:100%; height:100%; display:block; }

/* ── Stats bar ── */
#stats-bar {
  position:absolute; bottom:14px; left:14px;
  display:flex; gap:14px; pointer-events:none;
}
.stat-pill {
  background:rgba(13,12,10,0.82); border:1px solid var(--border);
  border-radius:20px; padding:4px 11px;
  font-size:10px; font-family:var(--font-mon); color:var(--text3);
}
.stat-pill b { color:var(--gold2); font-weight:400; }

/* ── Hint ── */
#hint {
  position:absolute; bottom:14px; right:14px;
  font-size:10px; font-family:var(--font-mon); color:var(--text3);
  pointer-events:none;
}

/* ── Side panel ── */
#panel {
  position:absolute; top:0; right:0; bottom:0;
  width:var(--panel-w); background:var(--surface);
  border-left:1px solid var(--border); transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; z-index:20; overflow:hidden;
}
#panel.open { transform:none; }

.panel-header {
  padding:18px 18px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; gap:10px;
}
.panel-cat-dot { width:9px; height:9px; border-radius:50%; margin-top:6px; flex-shrink:0; }
.panel-titles { flex:1; min-width:0; }
.panel-label { font-size:22px; font-weight:300; line-height:1.2; color:var(--text); word-break:break-word; }
.panel-cat { font-size:11px; font-family:var(--font-mon); color:var(--text3); margin-top:3px; text-transform:uppercase; letter-spacing:.08em; }
#panel-close {
  background:none; border:none; cursor:pointer; color:var(--text3);
  font-size:18px; padding:2px 4px; flex-shrink:0; margin-top:-2px;
}
#panel-close:hover { color:var(--text); }

.panel-body { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.panel-body::-webkit-scrollbar { width:3px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.panel-field label {
  display:block; font-size:10px; font-family:var(--font-mon); color:var(--text3);
  text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px;
}
.panel-field input, .panel-field textarea, .panel-field select {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; padding:8px 10px; color:var(--text);
  font-family:var(--font-ser); font-size:13.5px; outline:none;
  transition:border-color .2s; resize:vertical;
}
.panel-field input:focus, .panel-field textarea:focus, .panel-field select:focus { border-color:var(--gold); }
.panel-field select option { background:var(--surface2); }
.panel-field textarea { min-height:72px; }

.panel-connections { font-size:12px; color:var(--text2); line-height:1.7; }
.panel-conn-item {
  display:flex; align-items:center; gap:7px; padding:4px 0;
  cursor:pointer; border-radius:4px; padding:4px 6px; margin:0 -6px;
  transition:background .15s;
}
.panel-conn-item:hover { background:var(--gold-dim); }
.panel-conn-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.panel-conn-label { font-size:13px; }

.panel-footer { padding:14px 18px; border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
.pf-btn {
  flex:1; min-width:80px; padding:8px 10px; border-radius:6px;
  font-family:var(--font-mon); font-size:11px; cursor:pointer; transition:all .15s;
  border:1px solid var(--border2); background:none; color:var(--text2);
}
.pf-btn:hover { border-color:var(--gold); color:var(--gold2); }
.pf-btn.save { background:var(--gold-dim); border-color:var(--gold); color:var(--gold2); }
.pf-btn.save:hover { background:rgba(184,147,74,0.28); }
.pf-btn.danger { border-color:rgba(180,80,60,0.3); color:#B45040; }
.pf-btn.danger:hover { background:rgba(180,80,60,0.1); }

/* ── Modal ── */
#modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(2px);
  display:none; align-items:center; justify-content:center; z-index:100;
}
#modal-bg.open { display:flex; }
#modal {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:10px; width:420px; max-width:94vw; padding:24px;
  display:flex; flex-direction:column; gap:14px;
}
#modal h2 { font-size:20px; font-weight:400; color:var(--gold2); }
.modal-field label { display:block; font-size:10px; font-family:var(--font-mon); color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; padding:8px 10px; color:var(--text);
  font-family:var(--font-ser); font-size:13.5px; outline:none; resize:vertical;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color:var(--gold); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
.modal-actions button { padding:8px 18px; border-radius:6px; font-family:var(--font-mon); font-size:12px; cursor:pointer; border:1px solid var(--border2); background:none; color:var(--text2); transition:all .15s; }
.modal-actions button.primary { background:var(--gold-dim); border-color:var(--gold); color:var(--gold2); }
.modal-actions button:hover { border-color:var(--gold); color:var(--gold2); }

/* ── Toast ── */
#toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--surface2); border:1px solid var(--border2); border-radius:8px;
  padding:9px 20px; font-family:var(--font-mon); font-size:12px; color:var(--text2);
  opacity:0; transition:all .25s; pointer-events:none; z-index:200; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── Node labels on graph ── */
.node-label { pointer-events:none; user-select:none; }

/* ── Category colours ── */
.c-EventVision    { --nc: #B8934A; }
.c-KeyFigures     { --nc: #7A9E8A; }
.c-GlossaryConcepts { --nc: #9A7AB8; }
.c-LocationProfiles { --nc: #7A9EB8; }
.c-MarketingSEO   { --nc: #B87A7A; }
.c-ContentSocial  { --nc: #B8A87A; }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-logo">
      <img src="/static/logo.png" alt="ORIGIN" onerror="this.style.display='none'">
      <div class="sb-logo-text">
        <div class="sb-logo-name">ORIGIN</div>
        <div class="sb-logo-sub">Knowledge Graph</div>
      </div>
    </div>

    <div class="sb-section">Filter by category</div>
    <div class="sb-cats" id="cat-list">
      <div class="cat-chip active" data-cat="" onclick="filterCat(this,'')">
        <div class="cat-dot" style="background:var(--gold)"></div>
        All pages
      </div>
    </div>

    <div class="sb-section">Actions</div>
    <button class="sb-btn" onclick="openAddModal()"><span class="icon">＋</span> Add node</button>
    <button class="sb-btn" onclick="resetLayout()"><span class="icon">⟳</span> Reset layout</button>
    <button class="sb-btn" onclick="zoomFit()"><span class="icon">⊡</span> Zoom to fit</button>

    <div class="sb-footer">
      <div><a href="https://ourorigin.earth" target="_blank" style="color:var(--gold);text-decoration:none">ourorigin.earth</a></div>
      <div class="sb-date">October 17, 2026</div>
      <div style="margin-top:4px;color:var(--text3)">Ancient + Future · Hopeful · Grounded</div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="toolbar">
      <div class="tb-title">Wiki Knowledge Graph</div>
      <input id="search-box" placeholder="Search pages…" oninput="searchGraph(this.value)">
      <button class="tb-btn" onclick="openAddModal()">+ Add page</button>
      <button class="tb-btn primary" id="link-mode-btn" onclick="toggleLinkMode()">Link pages</button>
    </div>

    <div id="graph-wrap">
      <svg id="graph-svg">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="14" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="rgba(180,155,100,0.3)"/>
          </marker>
          <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="graph-root">
          <g id="links-layer"></g>
          <g id="nodes-layer"></g>
        </g>
      </svg>

      <div id="stats-bar">
        <div class="stat-pill"><b id="stat-nodes">0</b> pages</div>
        <div class="stat-pill"><b id="stat-edges">0</b> connections</div>
        <div class="stat-pill" id="stat-filter" style="display:none"><b id="stat-filter-label"></b> filtered</div>
      </div>

      <div id="hint">Drag · Scroll to zoom · Click to explore · Double-click canvas to add</div>
    </div>
  </div>

  <!-- Side panel -->
  <div id="panel">
    <div class="panel-header">
      <div class="panel-cat-dot" id="p-dot"></div>
      <div class="panel-titles">
        <div class="panel-label" id="p-label">—</div>
        <div class="panel-cat" id="p-cat">—</div>
      </div>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body">
      <div class="panel-field">
        <label>Page title</label>
        <input id="p-input-label" type="text">
      </div>
      <div class="panel-field">
        <label>Category</label>
        <select id="p-input-cat">
          <option>Event Vision & Philosophy</option>
          <option>Key Figures</option>
          <option>Glossary Concepts</option>
          <option>Location Profiles</option>
          <option>Marketing & SEO</option>
          <option>Content & Social Media</option>
        </select>
      </div>
      <div class="panel-field">
        <label>URL</label>
        <input id="p-input-url" type="text" placeholder="https://…">
      </div>
      <div class="panel-field">
        <label>Tags</label>
        <input id="p-input-tags" type="text" placeholder="comma, separated">
      </div>
      <div class="panel-field">
        <label>Notes</label>
        <textarea id="p-input-notes"></textarea>
      </div>
      <div class="panel-field" id="p-connections-wrap">
        <label>Connected pages</label>
        <div class="panel-connections" id="p-connections"></div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="pf-btn save" onclick="saveNode()">Save</button>
      <button class="pf-btn" id="p-url-btn" onclick="openURL()">Open URL</button>
      <button class="pf-btn danger" onclick="deleteNode()">Delete</button>
    </div>
  </div>

  <!-- Add Node Modal -->
  <div id="modal-bg" onclick="if(event.target===this)closeModal()">
    <div id="modal">
      <h2>Add wiki page</h2>
      <div class="modal-field">
        <label>Page title</label>
        <input id="m-label" type="text" placeholder="e.g. Synchronized Meditation">
      </div>
      <div class="modal-field">
        <label>Category</label>
        <select id="m-cat">
          <option>Event Vision & Philosophy</option>
          <option>Key Figures</option>
          <option>Glossary Concepts</option>
          <option>Location Profiles</option>
          <option>Marketing & SEO</option>
          <option>Content & Social Media</option>
        </select>
      </div>
      <div class="modal-field">
        <label>URL (optional)</label>
        <input id="m-url" type="text" placeholder="https://…">
      </div>
      <div class="modal-field">
        <label>Tags (comma separated)</label>
        <input id="m-tags" type="text">
      </div>
      <div class="modal-field">
        <label>Notes</label>
        <textarea id="m-notes" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="submitAdd()">Add page</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allNodes = [], allEdges = [], filteredNodes = [], filteredEdges = [];
let simulation, svg, root, linksLayer, nodesLayer, zoom;
let selectedNode = null, searchQ = '', activeFilter = '', linkMode = false, linkSource = null;
let W, H;

const CAT_COLORS = {
  'Event Vision & Philosophy': '#B8934A',
  'Key Figures':               '#7A9E8A',
  'Glossary Concepts':         '#9A7AB8',
  'Location Profiles':         '#7A9EB8',
  'Marketing & SEO':           '#B87A7A',
  'Content & Social Media':    '#B8A87A',
};

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/api/graph');
    const data = await r.json();
    allNodes = data.nodes;
    allEdges = data.edges;
  } catch(e) {
    console.warn('API not available, using empty graph');
    allNodes = []; allEdges = [];
  }
  buildCatList();
  applyFilter();
  setupSVG();
  buildGraph();
}

function buildCatList() {
  const cats = [...new Set(allNodes.map(n => n.category))].sort();
  const list = document.getElementById('cat-list');
  list.innerHTML = `<div class="cat-chip active" data-cat="" onclick="filterCat(this,'')">
    <div class="cat-dot" style="background:var(--gold)"></div>All pages</div>`;
  cats.forEach(c => {
    const col = CAT_COLORS[c] || '#888';
    list.innerHTML += `<div class="cat-chip" data-cat="${c}" onclick="filterCat(this,'${c.replace(/'/g,"\\'")}')">
      <div class="cat-dot" style="background:${col}"></div>${c}</div>`;
  });
}

// ── SVG + Zoom setup ──────────────────────────────────────────────────────────
function setupSVG() {
  const el = document.getElementById('graph-svg');
  const wrap = document.getElementById('graph-wrap');
  W = wrap.clientWidth; H = wrap.clientHeight;

  svg = d3.select('#graph-svg');
  root = d3.select('#graph-root');
  linksLayer = d3.select('#links-layer');
  nodesLayer = d3.select('#nodes-layer');

  zoom = d3.zoom()
    .scaleExtent([0.08, 6])
    .on('zoom', e => root.attr('transform', e.transform));
  svg.call(zoom);

  // Double-click on bg to add node
  svg.on('dblclick', e => {
    if (e.target === el || e.target.tagName === 'svg') openAddModal();
  });
}

// ── Build/rebuild graph ───────────────────────────────────────────────────────
function buildGraph() {
  if (!svg) return;
  linksLayer.selectAll('*').remove();
  nodesLayer.selectAll('*').remove();
  if (simulation) simulation.stop();

  const nodeMap = new Map(filteredNodes.map(n => [n.id, n]));
  const validEdges = filteredEdges.filter(e => nodeMap.has(e.source?.id || e.source) && nodeMap.has(e.target?.id || e.target));

  // Assign initial positions based on category
  const catCenters = {};
  const cats = [...new Set(filteredNodes.map(n=>n.category))];
  cats.forEach((c,i) => {
    const angle = (i / cats.length) * 2 * Math.PI - Math.PI/2;
    catCenters[c] = { x: W/2 + Math.cos(angle)*180, y: H/2 + Math.sin(angle)*160 };
  });
  filteredNodes.forEach(n => {
    if (n.x === undefined) {
      const center = catCenters[n.category] || {x:W/2, y:H/2};
      n.x = center.x + (Math.random()-.5)*100;
      n.y = center.y + (Math.random()-.5)*100;
    }
  });

  // Links
  const linkSel = linksLayer.selectAll('line').data(validEdges).join('line')
    .attr('stroke', 'rgba(180,155,100,0.22)')
    .attr('stroke-width', 1)
    .attr('marker-end', 'url(#arrowhead)');

  // Nodes
  const nodeSel = nodesLayer.selectAll('g.node-g').data(filteredNodes, d=>d.id).join('g')
    .attr('class', 'node-g')
    .style('cursor', linkMode ? 'crosshair' : 'pointer')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd))
    .on('click', (e, d) => {
      e.stopPropagation();
      if (linkMode) handleLinkClick(d);
      else selectNode(d);
    })
    .on('dblclick', (e, d) => {
      e.stopPropagation();
      selectNode(d);
    });

  // Node circles
  nodeSel.append('circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => (CAT_COLORS[d.category] || '#888') + '22')
    .attr('stroke', d => CAT_COLORS[d.category] || '#888')
    .attr('stroke-width', 1.2)
    .attr('class', 'node-circle');

  // Node labels
  nodeSel.append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', 'middle')
    .attr('dy', d => nodeRadius(d) + 13)
    .attr('fill', 'rgba(232,223,200,0.75)')
    .attr('font-family', 'Cormorant Garamond, serif')
    .attr('font-size', d => Math.max(10, Math.min(13, nodeRadius(d) * .85)))
    .text(d => truncate(d.label, 22));

  // Hover glow
  nodeSel.on('mouseenter', function(e, d) {
    d3.select(this).select('.node-circle')
      .attr('filter', 'url(#glow-filter)')
      .attr('stroke-width', 2);
  }).on('mouseleave', function(e, d) {
    if (!selectedNode || selectedNode.id !== d.id) {
      d3.select(this).select('.node-circle')
        .attr('filter', null).attr('stroke-width', 1.2);
    }
  });

  // Simulation
  simulation = d3.forceSimulation(filteredNodes)
    .force('link', d3.forceLink(validEdges).id(d=>d.id).distance(d => {
      const base = nodeRadius(d.source) + nodeRadius(d.target) + 48;
      return base;
    }).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-320))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(d => nodeRadius(d) + 20))
    .force('cluster', clusterForce(0.06))
    .on('tick', () => {
      linkSel
        .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
        .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
      nodeSel.attr('transform', d=>`translate(${d.x},${d.y})`);
    });

  updateStats();
}

// ── Cluster force ─────────────────────────────────────────────────────────────
function clusterForce(strength) {
  const cats = [...new Set(filteredNodes.map(n=>n.category))];
  return function(alpha) {
    const centers = {};
    cats.forEach((c,i) => {
      const angle = (i/cats.length)*2*Math.PI - Math.PI/2;
      centers[c] = {x: W/2+Math.cos(angle)*200, y: H/2+Math.sin(angle)*180};
    });
    filteredNodes.forEach(n => {
      const c = centers[n.category];
      if (!c) return;
      n.vx = (n.vx||0) + (c.x - n.x) * strength * alpha;
      n.vy = (n.vy||0) + (c.y - n.y) * strength * alpha;
    });
  };
}

// ── Node radius ───────────────────────────────────────────────────────────────
function nodeRadius(d) {
  const conns = filteredEdges.filter(e => (e.source?.id||e.source)===d.id || (e.target?.id||e.target)===d.id).length;
  return Math.max(10, Math.min(28, 10 + conns * 2.2));
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragged(e, d) { d.fx=e.x; d.fy=e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

// ── Select node ───────────────────────────────────────────────────────────────
function selectNode(d) {
  selectedNode = d;
  // Highlight
  nodesLayer.selectAll('.node-circle')
    .attr('opacity', n => isConnected(d, n) ? 1 : 0.2)
    .attr('filter', n => n.id===d.id ? 'url(#glow-filter)' : null)
    .attr('stroke-width', n => n.id===d.id ? 2.5 : 1.2);
  linksLayer.selectAll('line')
    .attr('opacity', e => (e.source.id===d.id||e.target.id===d.id) ? 1 : 0.06)
    .attr('stroke-width', e => (e.source.id===d.id||e.target.id===d.id) ? 2 : 1)
    .attr('stroke', e => (e.source.id===d.id||e.target.id===d.id) ? 'rgba(180,155,100,0.7)' : 'rgba(180,155,100,0.22)');
  nodesLayer.selectAll('text.node-label')
    .attr('opacity', n => isConnected(d, n) ? 1 : 0.15);
  openPanel(d);
}

function isConnected(a, b) {
  if (a.id === b.id) return true;
  return filteredEdges.some(e => {
    const s = e.source?.id||e.source, t = e.target?.id||e.target;
    return (s===a.id&&t===b.id)||(s===b.id&&t===a.id);
  });
}

function clearSelection() {
  selectedNode = null;
  nodesLayer.selectAll('.node-circle').attr('opacity',1).attr('filter',null).attr('stroke-width',1.2);
  linksLayer.selectAll('line').attr('opacity',1).attr('stroke-width',1).attr('stroke','rgba(180,155,100,0.22)');
  nodesLayer.selectAll('text.node-label').attr('opacity',1);
}

svg && svg.on('click', () => { clearSelection(); closePanel(); });

// ── Panel ─────────────────────────────────────────────────────────────────────
function openPanel(d) {
  const col = CAT_COLORS[d.category] || '#888';
  document.getElementById('p-dot').style.background = col;
  document.getElementById('p-label').textContent = d.label;
  document.getElementById('p-cat').textContent = d.category;
  document.getElementById('p-input-label').value = d.label||'';
  document.getElementById('p-input-cat').value = d.category||'Event Vision & Philosophy';
  document.getElementById('p-input-url').value = d.url||'';
  document.getElementById('p-input-tags').value = d.tags||'';
  document.getElementById('p-input-notes').value = d.notes||'';

  // Connected nodes
  const conns = filteredEdges.filter(e=>{
    const s=e.source?.id||e.source, t=e.target?.id||e.target;
    return s===d.id||t===d.id;
  }).map(e=>{
    const otherId = (e.source?.id||e.source)===d.id ? (e.target?.id||e.target) : (e.source?.id||e.source);
    return allNodes.find(n=>n.id===otherId);
  }).filter(Boolean);

  const connDiv = document.getElementById('p-connections');
  if (conns.length) {
    connDiv.innerHTML = conns.map(n=>{
      const c = CAT_COLORS[n.category]||'#888';
      return `<div class="panel-conn-item" onclick="selectNodeById('${n.id}')">
        <div class="panel-conn-dot" style="background:${c}"></div>
        <span class="panel-conn-label">${n.label}</span>
      </div>`;
    }).join('');
  } else {
    connDiv.innerHTML = '<span style="color:var(--text3);font-size:12px">No connections yet</span>';
  }
  document.getElementById('p-url-btn').style.opacity = d.url ? 1 : 0.3;
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  clearSelection();
}

function selectNodeById(id) {
  const d = allNodes.find(n=>n.id===id);
  if (d) { selectNode(d); panToNode(d); }
}

function panToNode(d) {
  const wrap = document.getElementById('graph-wrap');
  const W2 = wrap.clientWidth, H2 = wrap.clientHeight;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(W2/2 - d.x, H2/2 - d.y));
}

async function saveNode() {
  if (!selectedNode) return;
  const update = {
    label: document.getElementById('p-input-label').value,
    category: document.getElementById('p-input-cat').value,
    url: document.getElementById('p-input-url').value,
    tags: document.getElementById('p-input-tags').value,
    notes: document.getElementById('p-input-notes').value,
  };
  try {
    await fetch(`/api/nodes/${selectedNode.id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(update)});
  } catch(e){}
  Object.assign(selectedNode, update);
  document.getElementById('p-label').textContent = update.label;
  document.getElementById('p-cat').textContent = update.category;
  document.getElementById('p-dot').style.background = CAT_COLORS[update.category]||'#888';
  buildCatList(); applyFilter(); buildGraph();
  toast('Saved');
}

async function deleteNode() {
  if (!selectedNode || !confirm(`Delete "${selectedNode.label}"?`)) return;
  try { await fetch(`/api/nodes/${selectedNode.id}`,{method:'DELETE'}); } catch(e){}
  allNodes = allNodes.filter(n=>n.id!==selectedNode.id);
  allEdges = allEdges.filter(e=>(e.source?.id||e.source)!==selectedNode.id&&(e.target?.id||e.target)!==selectedNode.id);
  closePanel(); buildCatList(); applyFilter(); buildGraph();
  toast('Deleted');
}

function openURL() {
  const url = document.getElementById('p-input-url').value;
  if (url) window.open(url, '_blank');
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function applyFilter() {
  filteredNodes = allNodes.filter(n => {
    const catOk = !activeFilter || n.category === activeFilter;
    const qOk = !searchQ || n.label.toLowerCase().includes(searchQ) || (n.tags||'').toLowerCase().includes(searchQ) || (n.notes||'').toLowerCase().includes(searchQ);
    return catOk && qOk;
  });
  const fids = new Set(filteredNodes.map(n=>n.id));
  filteredEdges = allEdges.filter(e => fids.has(e.source?.id||e.source) && fids.has(e.target?.id||e.target));
}

function filterCat(el, cat) {
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = cat;
  const sf = document.getElementById('stat-filter');
  if (cat) { sf.style.display=''; document.getElementById('stat-filter-label').textContent=cat; }
  else sf.style.display='none';
  applyFilter(); buildGraph();
}

function searchGraph(q) {
  searchQ = q.toLowerCase().trim();
  applyFilter(); buildGraph();
  if (searchQ && filteredNodes.length===1) { selectNode(filteredNodes[0]); panToNode(filteredNodes[0]); }
}

// ── Link mode ─────────────────────────────────────────────────────────────────
function toggleLinkMode() {
  linkMode = !linkMode; linkSource = null;
  const btn = document.getElementById('link-mode-btn');
  btn.textContent = linkMode ? 'Cancel linking' : 'Link pages';
  btn.style.background = linkMode ? 'rgba(180,80,60,0.18)' : '';
  btn.style.borderColor = linkMode ? 'rgba(180,80,60,0.5)' : '';
  btn.style.color = linkMode ? '#B45040' : '';
  toast(linkMode ? 'Click source page, then target page to create a link' : 'Link mode off');
}

async function handleLinkClick(d) {
  if (!linkSource) {
    linkSource = d;
    nodesLayer.selectAll('.node-circle').filter(n=>n.id===d.id).attr('stroke','#B8934A').attr('stroke-width',3);
    toast(`Source: "${d.label}" — now click the target page`);
  } else if (linkSource.id !== d.id) {
    const s=linkSource.id, t=d.id;
    try { await fetch('/api/edges',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:s,target:t})}); } catch(e){}
    if (!allEdges.some(e=>(e.source?.id||e.source)===s&&(e.target?.id||e.target)===t))
      allEdges.push({source:s,target:t});
    linkSource = null;
    toggleLinkMode();
    applyFilter(); buildGraph();
    toast('Connection created');
  }
}

// ── Add node ──────────────────────────────────────────────────────────────────
function openAddModal() { document.getElementById('modal-bg').classList.add('open'); document.getElementById('m-label').focus(); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

async function submitAdd() {
  const label = document.getElementById('m-label').value.trim();
  if (!label) { toast('Please enter a page title'); return; }
  const node = { label, category:document.getElementById('m-cat').value, url:document.getElementById('m-url').value, tags:document.getElementById('m-tags').value, notes:document.getElementById('m-notes').value };
  try {
    const r = await fetch('/api/nodes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(node)});
    const data = await r.json();
    allNodes.push(data);
  } catch(e) {
    const id = label.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    allNodes.push({...node, id});
  }
  closeModal();
  document.getElementById('m-label').value='';
  document.getElementById('m-url').value='';
  document.getElementById('m-tags').value='';
  document.getElementById('m-notes').value='';
  buildCatList(); applyFilter(); buildGraph();
  toast(`"${label}" added`);
}

// ── Zoom controls ─────────────────────────────────────────────────────────────
function resetLayout() {
  filteredNodes.forEach(n => { delete n.x; delete n.y; });
  applyFilter(); buildGraph();
}

function zoomFit() {
  if (!filteredNodes.length) return;
  const xs = filteredNodes.map(n=>n.x), ys = filteredNodes.map(n=>n.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const wrap=document.getElementById('graph-wrap');
  const pad=60, W2=wrap.clientWidth, H2=wrap.clientHeight;
  const scale=Math.min(0.9,(W2-pad*2)/(maxX-minX||1),(H2-pad*2)/(maxY-minY||1));
  const tx=W2/2 - scale*(minX+maxX)/2, ty=H2/2 - scale*(minY+maxY)/2;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-nodes').textContent = filteredNodes.length;
  document.getElementById('stat-edges').textContent = filteredEdges.length;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function truncate(s, n) { return s && s.length>n ? s.slice(0,n-1)+'…' : s; }

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closePanel(); closeModal(); if(linkMode) toggleLinkMode(); }
  if ((e.key==='f'||e.key==='F') && !e.target.matches('input,textarea')) { zoomFit(); }
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
