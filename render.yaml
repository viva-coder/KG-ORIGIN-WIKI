services:
  - type: web
    name: origin-knowledge-graph
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: origin-kg-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: origin-kg-db
    plan: free
    databaseName: origin_kg
